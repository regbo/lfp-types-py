name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build package
        run: |
          # Add repository URL metadata during publish builds.
          sed -i '/\[build-system\]/i [project.urls]\nRepository = "https://github.com/${{ github.repository }}"\n' pyproject.toml
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
